services:
  db:
    image: mariadb:11.3.2-jammy
    restart: unless-stopped
    env_file:
      - path: ./mariadb.env
        required: true
    ports:
      - "3306:3306"
    volumes:
      - mariadb_data:/var/lib/mysql

  phpmyadmin:
    image: phpmyadmin:5.2.1-apache
    restart: unless-stopped
    depends_on:
      - db
    env_file:
      - path: ./pma.env
        required: true
    ports:
      - "8080:80"

  php-app:
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      - ./src:/var/www/html
    depends_on:
      - db
      - phpmyadmin
    env_file:
      - path: ./app.env
        required: true
      - path: ./mariadb.env
        required: true

    ports:
      # The first port is the port that you can connect to from the host.
      # The second port is the port that other containers can connect to.
      - "80:80"

volumes:
  mariadb_data:
